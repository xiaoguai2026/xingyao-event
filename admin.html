<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 星耀活动策划</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-card: #1a1a1a;
            --bg-elevated: #222222;
            --accent: #ff6b35;
            --accent-light: #ff8c5a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --border: #2a2a2a;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* 登录页 */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        }

        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c5a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-box p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .login-form input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .login-form input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .login-form button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c5a 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .login-form button:hover {
            transform: translateY(-2px);
        }

        /* 后台布局 */
        .admin-layout {
            display: none;
            min-height: 100vh;
        }

        .admin-layout.active {
            display: flex;
        }

        /* 侧边栏 */
        .sidebar {
            width: 260px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
            font-size: 1.3rem;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c5a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-nav {
            flex: 1;
            padding: 1rem 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 1rem 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-item:hover,
        .nav-item.active {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border-right: 3px solid var(--accent);
        }

        .nav-item .icon {
            font-size: 1.2rem;
        }

        .sidebar-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
        }

        .logout-btn {
            width: 100%;
            padding: 0.8rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }

        .top-bar h3 {
            font-weight: 500;
        }

        .top-bar-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-light);
        }

        .btn-secondary {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }

        /* 内容区域 */
        .content-area {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .stat-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .stat-card-title {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .stat-card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .stat-card-icon.blue { background: rgba(59, 130, 246, 0.2); }
        .stat-card-icon.green { background: rgba(34, 197, 94, 0.2); }
        .stat-card-icon.orange { background: rgba(255, 107, 53, 0.2); }
        .stat-card-icon.purple { background: rgba(168, 85, 247, 0.2); }

        .stat-card-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .stat-card-change {
            font-size: 0.85rem;
            color: var(--success);
        }

        .stat-card-change.negative {
            color: var(--danger);
        }

        /* 图表区域 */
        .chart-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .chart-filters {
            display: flex;
            gap: 0.5rem;
        }

        .chart-filter {
            padding: 0.4rem 0.8rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
        }

        .chart-filter.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .chart-container {
            height: 300px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }

        .chart-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .chart-bar-fill {
            width: 40px;
            background: linear-gradient(to top, var(--accent), var(--accent-light));
            border-radius: 6px 6px 0 0;
            transition: height 0.5s ease;
        }

        .chart-bar-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* 表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .data-table tr:hover {
            background: var(--bg-elevated);
        }

        .status-badge {
            display: inline-flex;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-badge.unread {
            background: rgba(255, 107, 53, 0.2);
            color: var(--accent);
        }

        .status-badge.read {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h3 {
            font-size: 1.2rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .data-table {
                font-size: 0.85rem;
            }
            
            .data-table th,
            .data-table td {
                padding: 0.8rem 0.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div class="login-page" id="loginPage">
        <div class="login-box">
            <h1>星耀后台管理</h1>
            <p>请输入密码登录</p>
            <form class="login-form" id="loginForm">
                <input type="password" id="password" placeholder="请输入密码" required>
                <button type="submit">登录</button>
            </form>
            <p style="margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted);">
                默认密码: admin123
            </p>
        </div>
    </div>

    <!-- 后台布局 -->
    <div class="admin-layout" id="adminLayout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>星耀后台</h2>
            </div>
            <nav class="sidebar-nav">
                <a class="nav-item active" data-page="dashboard">
                    <span class="icon">📊</span>
                    <span>数据概览</span>
                </a>
                <a class="nav-item" data-page="messages">
                    <span class="icon">💬</span>
                    <span>留言管理</span>
                    <span id="unreadBadge" style="margin-left: auto; background: var(--accent); color: white; padding: 0.2rem 0.5rem; border-radius: 10px; font-size: 0.75rem; display: none;">0</span>
                </a>
                <a class="nav-item" data-page="cases">
                    <span class="icon">🎯</span>
                    <span>案例管理</span>
                </a>
                <a class="nav-item" data-page="testimonials">
                    <span class="icon">⭐</span>
                    <span>评价管理</span>
                </a>
                <a class="nav-item" data-page="settings">
                    <span class="icon">⚙️</span>
                    <span>系统设置</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" id="logoutBtn">退出登录</button>
            </div>
        </aside>

        <!-- 主内容 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <header class="top-bar">
                <h3 id="pageTitle">数据概览</h3>
                <div class="top-bar-actions">
                    <a href="index.html" target="_blank" class="btn btn-secondary">查看网站</a>
                    <button class="btn btn-primary" id="refreshBtn">刷新数据</button>
                </div>
            </header>

            <!-- 内容区域 -->
            <div class="content-area">
                <!-- 数据概览 -->
                <div class="page active" id="dashboardPage">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-card-header">
                                <span class="stat-card-title">今日访问</span>
                                <div class="stat-card-icon blue">👁️</div>
                            </div>
                            <div class="stat-card-value" id="todayVisits">0</div>
                            <div class="stat-card-change">+12% 较昨日</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-card-header">
                                <span class="stat-card-title">总访问量</span>
                                <div class="stat-card-icon green">📈</div>
                            </div>
                            <div class="stat-card-value" id="totalVisits">0</div>
                            <div class="stat-card-change">持续增长</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-card-header">
                                <span class="stat-card-title">新留言</span>
                                <div class="stat-card-icon orange">💬</div>
                            </div>
                            <div class="stat-card-value" id="newMessages">0</div>
                            <div class="stat-card-change" id="msgChange">待处理</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-card-header">
                                <span class="stat-card-title">案例数量</span>
                                <div class="stat-card-icon purple">🎯</div>
                            </div>
                            <div class="stat-card-value" id="caseCount">0</div>
                            <div class="stat-card-change">已发布</div>
                        </div>
                    </div>

                    <div class="chart-section">
                        <div class="chart-header">
                            <h4 class="chart-title">访问趋势</h4>
                            <div class="chart-filters">
                                <button class="chart-filter active" data-range="7">7天</button>
                                <button class="chart-filter" data-range="30">30天</button>
                            </div>
                        </div>
                        <div class="chart-container" id="visitChart">
                            <!-- 动态生成 -->
                        </div>
                    </div>

                    <div class="chart-section">
                        <div class="chart-header">
                            <h4 class="chart-title">最近留言</h4>
                        </div>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>姓名</th>
                                    <th>电话</th>
                                    <th>活动类型</th>
                                    <th>时间</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody id="recentMessages">
                                <!-- 动态生成 -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 留言管理 -->
                <div class="page" id="messagesPage">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <div class="chart-filters">
                            <button class="chart-filter active" data-filter="all">全部</button>
                            <button class="chart-filter" data-filter="unread">未读</button>
                            <button class="chart-filter" data-filter="read">已读</button>
                        </div>
                        <button class="btn btn-danger btn-sm" id="clearAllMsg">清空全部</button>
                    </div>
                    <div id="messagesList">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 案例管理 -->
                <div class="page" id="casesPage">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h4>案例列表</h4>
                        <button class="btn btn-primary" id="addCaseBtn">+ 添加案例</button>
                    </div>
                    <div id="casesList">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 评价管理 -->
                <div class="page" id="testimonialsPage">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h4>客户评价</h4>
                        <button class="btn btn-primary" id="addTestimonialBtn">+ 添加评价</button>
                    </div>
                    <div id="testimonialsList">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 系统设置 -->
                <div class="page" id="settingsPage">
                    <div class="chart-section">
                        <div class="chart-header">
                            <h4 class="chart-title">修改密码</h4>
                        </div>
                        <form id="changePasswordForm">
                            <div class="form-group">
                                <label>当前密码</label>
                                <input type="password" id="currentPassword" required>
                            </div>
                            <div class="form-group">
                                <label>新密码</label>
                                <input type="password" id="newPassword" required>
                            </div>
                            <div class="form-group">
                                <label>确认新密码</label>
                                <input type="password" id="confirmPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary">修改密码</button>
                        </form>
                    </div>

                    <div class="chart-section">
                        <div class="chart-header">
                            <h4 class="chart-title">数据管理</h4>
                        </div>
                        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                            <button class="btn btn-secondary" id="exportData">导出全部数据</button>
                            <button class="btn btn-secondary" id="importData">导入数据</button>
                            <button class="btn btn-danger" id="clearAllData">清空全部数据</button>
                        </div>
                        <input type="file" id="importFile" accept=".json" style="display: none;">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 添加案例模态框 -->
    <div class="modal" id="caseModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加案例</h3>
                <button class="modal-close" onclick="closeModal('caseModal')">&times;</button>
            </div>
            <form id="caseForm">
                <div class="modal-body">
                    <div class="form-group">
                        <label>案例标题 *</label>
                        <input type="text" name="title" required>
                    </div>
                    <div class="form-group">
                        <label>案例分类 *</label>
                        <select name="category" required>
                            <option value="">请选择分类</option>
                            <option value="企业年会">企业年会</option>
                            <option value="新品发布会">新品发布会</option>
                            <option value="开业庆典">开业庆典</option>
                            <option value="会议论坛">会议论坛</option>
                            <option value="婚礼策划">婚礼策划</option>
                            <option value="展览展会">展览展会</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>封面图片 URL *</label>
                        <input type="url" name="image" required placeholder="https://...">
                        <small style="color: var(--text-muted);">可以使用 Unsplash 等免费图库链接</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('caseModal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 添加评价模态框 -->
    <div class="modal" id="testimonialModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加评价</h3>
                <button class="modal-close" onclick="closeModal('testimonialModal')">&times;</button>
            </div>
            <form id="testimonialForm">
                <div class="modal-body">
                    <div class="form-group">
                        <label>评价内容 *</label>
                        <textarea name="text" required placeholder="请输入客户评价内容..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>客户姓名 *</label>
                        <input type="text" name="author" required>
                    </div>
                    <div class="form-group">
                        <label>客户公司 *</label>
                        <input type="text" name="company" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('testimonialModal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 初始化数据
        const initData = () => {
            if (!localStorage.getItem('adminPassword')) {
                localStorage.setItem('adminPassword', 'admin123');
            }
            if (!localStorage.getItem('siteStats')) {
                localStorage.setItem('siteStats', JSON.stringify({
                    visits: {},
                    totalVisits: 0,
                    pageViews: {},
                    visitLog: [],
                    durations: []
                }));
            }
            if (!localStorage.getItem('messages')) {
                localStorage.setItem('messages', '[]');
            }
            if (!localStorage.getItem('cases')) {
                localStorage.setItem('cases', '[]');
            }
            if (!localStorage.getItem('testimonials')) {
                localStorage.setItem('testimonials', '[]');
            }
        };
        initData();

        // 登录
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const savedPassword = localStorage.getItem('adminPassword');
            
            if (password === savedPassword) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                showAdmin();
            } else {
                alert('密码错误！');
            }
        });

        // 显示后台
        const showAdmin = () => {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('adminLayout').classList.add('active');
            loadDashboard();
        };

        // 检查登录状态
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            showAdmin();
        }

        // 退出登录
        document.getElementById('logoutBtn').addEventListener('click', () => {
            sessionStorage.removeItem('adminLoggedIn');
            location.reload();
        });

        // 页面切换
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const page = item.dataset.page;
                
                // 更新导航状态
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                
                // 切换页面
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(page + 'Page').classList.add('active');
                
                // 更新标题
                const titles = {
                    dashboard: '数据概览',
                    messages: '留言管理',
                    cases: '案例管理',
                    testimonials: '评价管理',
                    settings: '系统设置'
                };
                document.getElementById('pageTitle').textContent = titles[page];
                
                // 加载页面数据
                if (page === 'dashboard') loadDashboard();
                if (page === 'messages') loadMessages();
                if (page === 'cases') loadCases();
                if (page === 'testimonials') loadTestimonials();
            });
        });

        // 加载仪表盘
        const loadDashboard = () => {
            const stats = JSON.parse(localStorage.getItem('siteStats') || '{}');
            const messages = JSON.parse(localStorage.getItem('messages') || '[]');
            const cases = JSON.parse(localStorage.getItem('cases') || '[]');
            const today = new Date().toISOString().split('T')[0];
            
            // 统计数据
            document.getElementById('todayVisits').textContent = stats.visits?.[today] || 0;
            document.getElementById('totalVisits').textContent = stats.totalVisits || 0;
            document.getElementById('newMessages').textContent = messages.filter(m => m.status === 'unread').length;
            document.getElementById('caseCount').textContent = cases.length;
            
            // 更新未读徽章
            const unreadCount = messages.filter(m => m.status === 'unread').length;
            const badge = document.getElementById('unreadBadge');
            if (unreadCount > 0) {
                badge.textContent = unreadCount;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
            
            // 生成访问图表
            renderVisitChart(7);
            
            // 最近留言
            const recentMsg = messages.slice(0, 5);
            const tbody = document.getElementById('recentMessages');
            if (recentMsg.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">暂无留言</td></tr>';
            } else {
                tbody.innerHTML = recentMsg.map(m => `
                    <tr>
                        <td>${m.name}</td>
                        <td>${m.phone}</td>
                        <td>${m.type || '-'}</td>
                        <td>${new Date(m.time).toLocaleString()}</td>
                        <td><span class="status-badge ${m.status}">${m.status === 'unread' ? '未读' : '已读'}</span></td>
                    </tr>
                `).join('');
            }
        };

        // 渲染访问图表
        const renderVisitChart = (days) => {
            const stats = JSON.parse(localStorage.getItem('siteStats') || '{}');
            const container = document.getElementById('visitChart');
            
            const data = [];
            for (let i = days - 1; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                const count = stats.visits?.[dateStr] || 0;
                data.push({
                    label: date.getMonth() + 1 + '/' + date.getDate(),
                    value: count
                });
            }
            
            const maxValue = Math.max(...data.map(d => d.value), 1);
            
            container.innerHTML = data.map(d => `
                <div class="chart-bar">
                    <div class="chart-bar-fill" style="height: ${(d.value / maxValue * 250)}px;"></div>
                    <div class="chart-bar-label">${d.label}</div>
                </div>
            `).join('');
        };

        // 图表筛选
        document.querySelectorAll('.chart-filter[data-range]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.chart-filter[data-range]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderVisitChart(parseInt(btn.dataset.range));
            });
        });

        // 加载留言
        const loadMessages = (filter = 'all') => {
            const messages = JSON.parse(localStorage.getItem('messages') || '[]');
            const container = document.getElementById('messagesList');
            
            let filtered = messages;
            if (filter === 'unread') filtered = messages.filter(m => m.status === 'unread');
            if (filter === 'read') filtered = messages.filter(m => m.status === 'read');
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <p>暂无留言</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>姓名</th>
                            <th>电话</th>
                            <th>公司</th>
                            <th>活动类型</th>
                            <th>时间</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filtered.map(m => `
                            <tr>
                                <td>${m.name}</td>
                                <td>${m.phone}</td>
                                <td>${m.company || '-'}</td>
                                <td>${m.type || '-'}</td>
                                <td>${new Date(m.time).toLocaleString()}</td>
                                <td><span class="status-badge ${m.status}">${m.status === 'unread' ? '未读' : '已读'}</span></td>
                                <td>
                                    <button class="btn btn-secondary btn-sm" onclick="viewMessage(${m.id})">查看</button>
                                    <button class="btn btn-danger btn-sm" onclick="deleteMessage(${m.id})">删除</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        };

        // 留言筛选
        document.querySelectorAll('.chart-filter[data-filter]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.chart-filter[data-filter]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadMessages(btn.dataset.filter);
            });
        });

        // 查看留言
        window.viewMessage = (id) => {
            const messages = JSON.parse(localStorage.getItem('messages') || '[]');
            const msg = messages.find(m => m.id === id);
            if (msg) {
                // 标记为已读
                msg.status = 'read';
                localStorage.setItem('messages', JSON.stringify(messages));
                
                alert(`留言详情：\n\n姓名：${msg.name}\n电话：${msg.phone}\n公司：${msg.company || '-'}\n活动类型：${msg.type || '-'}\n时间：${new Date(msg.time).toLocaleString()}\n\n需求描述：\n${msg.content || '无'}`);
                loadMessages();
                loadDashboard();
            }
        };

        // 删除留言
        window.deleteMessage = (id) => {
            if (confirm('确定删除这条留言吗？')) {
                let messages = JSON.parse(localStorage.getItem('messages') || '[]');
                messages = messages.filter(m => m.id !== id);
                localStorage.setItem('messages', JSON.stringify(messages));
                loadMessages();
                loadDashboard();
            }
        };

        // 清空全部留言
        document.getElementById('clearAllMsg').addEventListener('click', () => {
            if (confirm('确定清空所有留言吗？此操作不可恢复！')) {
                localStorage.setItem('messages', '[]');
                loadMessages();
                loadDashboard();
            }
        });

        // 加载案例
        const loadCases = () => {
            const cases = JSON.parse(localStorage.getItem('cases') || '[]');
            const container = document.getElementById('casesList');
            
            if (cases.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎯</div>
                        <p>暂无案例，点击右上角添加</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div class="stats-grid">
                    ${cases.map(c => `
                        <div class="stat-card">
                            <img src="${c.image}" style="width: 100%; height: 150px; object-fit: cover; border-radius: 8px; margin-bottom: 1rem;">
                            <h4 style="margin-bottom: 0.5rem;">${c.title}</h4>
                            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem;">${c.category}</p>
                            <button class="btn btn-danger btn-sm" onclick="deleteCase(${c.id})" style="width: 100%;">删除</button>
                        </div>
                    `).join('')}
                </div>
            `;
        };

        // 添加案例
        document.getElementById('addCaseBtn').addEventListener('click', () => {
            document.getElementById('caseModal').classList.add('active');
        });

        document.getElementById('caseForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const caseItem = {
                id: Date.now(),
                title: formData.get('title'),
                category: formData.get('category'),
                image: formData.get('image')
            };
            
            const cases = JSON.parse(localStorage.getItem('cases') || '[]');
            cases.unshift(caseItem);
            localStorage.setItem('cases', JSON.stringify(cases));
            
            closeModal('caseModal');
            e.target.reset();
            loadCases();
            loadDashboard();
        });

        // 删除案例
        window.deleteCase = (id) => {
            if (confirm('确定删除这个案例吗？')) {
                let cases = JSON.parse(localStorage.getItem('cases') || '[]');
                cases = cases.filter(c => c.id !== id);
                localStorage.setItem('cases', JSON.stringify(cases));
                loadCases();
                loadDashboard();
            }
        };

        // 加载评价
        const loadTestimonials = () => {
            const testimonials = JSON.parse(localStorage.getItem('testimonials') || '[]');
            const container = document.getElementById('testimonialsList');
            
            if (testimonials.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⭐</div>
                        <p>暂无评价，点击右上角添加</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div class="stats-grid">
                    ${testimonials.map(t => `
                        <div class="stat-card">
                            <p style="font-style: italic; margin-bottom: 1rem; line-height: 1.6;">"${t.text}"</p>
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                <div style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #ff6b35, #ff8c5a); display: flex; align-items: center; justify-content: center; font-weight: 600;">${t.author[0]}</div>
                                <div>
                                    <div style="font-weight: 600;">${t.author}</div>
                                    <div style="color: var(--text-secondary); font-size: 0.85rem;">${t.company}</div>
                                </div>
                            </div>
                            <button class="btn btn-danger btn-sm" onclick="deleteTestimonial(${t.id})" style="width: 100%; margin-top: 1rem;">删除</button>
                        </div>
                    `).join('')}
                </div>
            `;
        };

        // 添加评价
        document.getElementById('addTestimonialBtn').addEventListener('click', () => {
            document.getElementById('testimonialModal').classList.add('active');
        });

        document.getElementById('testimonialForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const testimonial = {
                id: Date.now(),
                text: formData.get('text'),
                author: formData.get('author'),
                company: formData.get('company'),
                avatar: formData.get('author')[0]
            };
            
            const testimonials = JSON.parse(localStorage.getItem('testimonials') || '[]');
            testimonials.unshift(testimonial);
            localStorage.setItem('testimonials', JSON.stringify(testimonials));
            
            closeModal('testimonialModal');
            e.target.reset();
            loadTestimonials();
            loadDashboard();
        });

        // 删除评价
        window.deleteTestimonial = (id) => {
            if (confirm('确定删除这条评价吗？')) {
                let testimonials = JSON.parse(localStorage.getItem('testimonials') || '[]');
                testimonials = testimonials.filter(t => t.id !== id);
                localStorage.setItem('testimonials', JSON.stringify(testimonials));
                loadTestimonials();
                loadDashboard();
            }
        };

        // 关闭模态框
        window.closeModal = (id) => {
            document.getElementById(id).classList.remove('active');
        };

        // 修改密码
        document.getElementById('changePasswordForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (current !== localStorage.getItem('adminPassword')) {
                alert('当前密码错误！');
                return;
            }
            
            if (newPass !== confirm) {
                alert('两次输入的新密码不一致！');
                return;
            }
            
            localStorage.setItem('adminPassword', newPass);
            alert('密码修改成功！');
            e.target.reset();
        });

        // 导出数据
        document.getElementById('exportData').addEventListener('click', () => {
            const data = {
                messages: JSON.parse(localStorage.getItem('messages') || '[]'),
                cases: JSON.parse(localStorage.getItem('cases') || '[]'),
                testimonials: JSON.parse(localStorage.getItem('testimonials') || '[]'),
                siteStats: JSON.parse(localStorage.getItem('siteStats') || '{}'),
                exportTime: new Date().toISOString()
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `xingyao-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        });

        // 导入数据
        document.getElementById('importData').addEventListener('click', () => {
            document.getElementById('importFile').click();
        });

        document.getElementById('importFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    if (data.messages) localStorage.setItem('messages', JSON.stringify(data.messages));
                    if (data.cases) localStorage.setItem('cases', JSON.stringify(data.cases));
                    if (data.testimonials) localStorage.setItem('testimonials', JSON.stringify(data.testimonials));
                    if (data.siteStats) localStorage.setItem('siteStats', JSON.stringify(data.siteStats));
                    
                    alert('数据导入成功！');
                    location.reload();
                } catch (err) {
                    alert('导入失败：文件格式错误');
                }
            };
            reader.readAsText(file);
        });

        // 清空全部数据
        document.getElementById('clearAllData').addEventListener('click', () => {
            if (confirm('确定清空所有数据吗？此操作不可恢复！')) {
                localStorage.setItem('messages', '[]');
                localStorage.setItem('cases', '[]');
                localStorage.setItem('testimonials', '[]');
                localStorage.setItem('siteStats', JSON.stringify({
                    visits: {},
                    totalVisits: 0,
                    pageViews: {},
                    visitLog: [],
                    durations: []
                }));
                alert('数据已清空！');
                location.reload();
            }
        });

        // 刷新数据
        document.getElementById('refreshBtn').addEventListener('click', () => {
            loadDashboard();
        });

        // 点击模态框外部关闭
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
