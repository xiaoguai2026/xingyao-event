<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 星耀活动策划</title>
    
    <style>
        :root {
            --primary: #153E76;
            --primary-dark: #0d2a52;
            --primary-light: #1e5294;
            --accent: #153E76;
            --accent-light: #1e5294;
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --text-muted: #999999;
            --bg-dark: #0a1628;
            --bg-card: #153E76;
            --bg-light: #1a1a2e;
            --border: rgba(255,255,255,0.15);
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #ef4444;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        /* Login Page */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        }
        
        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .login-box h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }
        
        .login-box h1 span {
            color: var(--accent);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 1rem;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #ffffff;
        }
        
        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: #ffffff;
            color: var(--primary);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: var(--text-secondary);
        }
        
        .btn-secondary {
            padding: 0.7rem 1.5rem;
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .btn-danger {
            padding: 0.5rem 1rem;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        .btn-success {
            padding: 0.7rem 1.5rem;
            background: #ffffff;
            color: var(--primary);
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-success:hover {
            background: var(--text-secondary);
        }
        
        /* Dashboard */
        .dashboard {
            display: none;
            min-height: 100vh;
        }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 260px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 2rem;
            overflow-y: auto;
        }
        
        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .sidebar-logo span {
            color: var(--accent);
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-menu li {
            margin-bottom: 0.5rem;
        }
        
        .nav-menu a {
            display: block;
            padding: 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .nav-menu a:hover,
        .nav-menu a.active {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }
        
        .main-content {
            margin-left: 260px;
            padding: 2rem;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .header h2 {
            font-size: 1.5rem;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-secondary);
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }
        
        .stat-card h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 900;
            color: #ffffff;
        }
        
        /* Content Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .card-header h3 {
            font-size: 1.1rem;
        }
        
        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th,
        .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        .data-table th {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
        }
        
        .data-table td {
            color: var(--text-primary);
        }
        
        .data-table tr:hover td {
            background: rgba(255,255,255,0.02);
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal h3 {
            margin-bottom: 1.5rem;
        }
        
        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }
        
        /* Alert */
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        
        .alert-success {
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }
        
        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }
        
        /* Section visibility */
        .section-content {
            display: none;
        }
        
        .section-content.active {
            display: block;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div class="login-page" id="login-page">
        <div class="login-box">
            <h1><span>星耀</span>后台管理</h1>
            <form id="login-form">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" value="admin" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn-primary">登录</button>
            </form>
            <p style="text-align: center; margin-top: 1rem; color: var(--text-muted); font-size: 0.85rem;">
                默认密码: admin123
            </p>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <span>星耀</span>后台
            </div>
            <ul class="nav-menu">
                <li><a href="#" class="active" data-section="overview">📊 概览统计</a></li>
                <li><a href="#" data-section="cases">📁 案例管理</a></li>
                <li><a href="#" data-section="inquiries">📨 客户咨询</a></li>
                <li><a href="#" data-section="settings">⚙️ 系统设置</a></li>
                <li><a href="#" onclick="logout()">🚪 退出登录</a></li>
            </ul>
        </aside>
        
        <main class="main-content">
            <!-- Overview Section -->
            <div class="section-content active" id="section-overview">
                <div class="header">
                    <h2>概览统计</h2>
                    <div class="user-info">
                        <span id="current-user">admin</span>
                        <button class="btn-secondary" onclick="logout()">退出</button>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>总访问量</h3>
                        <div class="stat-number" id="stat-visits">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>案例数量</h3>
                        <div class="stat-number" id="stat-cases">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>客户咨询</h3>
                        <div class="stat-number" id="stat-inquiries">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>今日访问</h3>
                        <div class="stat-number" id="stat-today">0</div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3>最近活动</h3>
                    </div>
                    <p style="color: var(--text-secondary);">暂无最近活动记录</p>
                </div>
            </div>
            
            <!-- Cases Section -->
            <div class="section-content" id="section-cases">
                <div class="header">
                    <h2>案例管理</h2>
                    <button class="btn-success" onclick="openCaseModal()">+ 新增案例</button>
                </div>
                
                <div id="cases-alert"></div>
                
                <div class="card">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>封面</th>
                                <th>标题</th>
                                <th>分类</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="cases-table">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- Inquiries Section -->
            <div class="section-content" id="section-inquiries">
                <div class="header">
                    <h2>客户咨询</h2>
                </div>
                
                <div class="card">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>姓名</th>
                                <th>电话</th>
                                <th>类型</th>
                                <th>需求</th>
                            </tr>
                        </thead>
                        <tbody id="inquiries-table">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- Settings Section -->
            <div class="section-content" id="section-settings">
                <div class="header">
                    <h2>系统设置</h2>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3>修改密码</h3>
                    </div>
                    <form id="password-form">
                        <div class="form-group">
                            <label>当前密码</label>
                            <input type="password" id="current-password" required>
                        </div>
                        <div class="form-group">
                            <label>新密码</label>
                            <input type="password" id="new-password" required>
                        </div>
                        <div class="form-group">
                            <label>确认新密码</label>
                            <input type="password" id="confirm-password" required>
                        </div>
                        <button type="submit" class="btn-primary" style="width: auto;">保存修改</button>
                    </form>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3>GitHub 配置</h3>
                    </div>
                    <div class="form-group">
                        <label>GitHub Token (用于数据同步)</label>
                        <input type="password" id="github-token" placeholder="ghp_xxxxxxxxxxxx">
                        <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 0.5rem;">
                            Token 需要 repo 权限才能读写数据文件
                        </p>
                    </div>
                    <button class="btn-primary" onclick="saveGitHubToken()" style="width: auto;">保存配置</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Case Modal -->
    <div class="modal-overlay" id="case-modal">
        <div class="modal">
            <h3 id="modal-title">新增案例</h3>
            <form id="case-form">
                <input type="hidden" id="case-id">
                <div class="form-group">
                    <label>案例标题 *</label>
                    <input type="text" id="case-title" required placeholder="请输入案例标题">
                </div>
                <div class="form-group">
                    <label>案例分类 *</label>
                    <input type="text" id="case-category" required placeholder="如：发布会、年会、庆典">
                </div>
                <div class="form-group">
                    <label>封面图片 URL *</label>
                    <input type="url" id="case-image" required placeholder="https://images.unsplash.com/...">
                    <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 0.3rem;">
                        可使用 Unsplash 等免费图库链接
                    </p>
                </div>
                <div class="form-group">
                    <label>案例描述</label>
                    <input type="text" id="case-description" placeholder="简短描述案例内容">
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-secondary" onclick="closeCaseModal()">取消</button>
                    <button type="submit" class="btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // GitHub 配置
        const GITHUB_CONFIG = {
            owner: 'xiaoguai2026',
            repo: 'xingyao-event',
            branch: 'main',
            dataPath: 'data/cases.json'
        };

        // 状态管理
        let cases = [];
        let inquiries = [];
        let githubToken = localStorage.getItem('githubToken') || '';

        // 默认案例
        const defaultCases = [
            {
                id: 1,
                title: '科技产品发布会',
                category: '发布会',
                description: '为知名科技公司打造的沉浸式产品发布体验',
                image: 'https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=800'
            },
            {
                id: 2,
                title: '城市音乐节',
                category: '音乐节',
                description: '万人规模的城市文化音乐盛典',
                image: 'https://images.unsplash.com/photo-1459749411177-047381bb3ece?w=800'
            },
            {
                id: 3,
                title: '购物中心开业盛典',
                category: '开业庆典',
                description: '大型商业综合体开幕庆典活动',
                image: 'https://images.unsplash.com/photo-1511578314322-379afb476865?w=800'
            },
            {
                id: 4,
                title: '企业年会',
                category: '年会',
                description: '年度企业盛典与团队表彰大会',
                image: 'https://images.unsplash.com/photo-1515187029135-18ee286d815b?w=800'
            }
        ];

        // 登录
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // 验证密码
            const storedPassword = localStorage.getItem('adminPassword') || 'admin123';
            
            if (username === 'admin' && password === storedPassword) {
                localStorage.setItem('isLoggedIn', 'true');
                showDashboard();
            } else {
                alert('用户名或密码错误');
            }
        });

        // 显示仪表盘
        function showDashboard() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('current-user').textContent = 'admin';
            
            // 加载数据
            loadCases();
            loadInquiries();
            updateStats();
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('isLoggedIn');
            document.getElementById('login-page').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }

        // 导航切换
        document.querySelectorAll('.nav-menu a[data-section]').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const section = this.dataset.section;
                
                // 更新导航状态
                document.querySelectorAll('.nav-menu a').forEach(a => a.classList.remove('active'));
                this.classList.add('active');
                
                // 显示对应内容
                document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
                document.getElementById('section-' + section).classList.add('active');
            });
        });

        // 从 GitHub 加载案例
        async function loadCases() {
            try {
                const response = await fetch(`https://raw.githubusercontent.com/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/${GITHUB_CONFIG.branch}/${GITHUB_CONFIG.dataPath}?t=${Date.now()}`);
                if (response.ok) {
                    cases = await response.json();
                } else {
                    cases = [...defaultCases];
                }
            } catch (error) {
                console.log('从 GitHub 加载失败，使用本地数据');
                cases = JSON.parse(localStorage.getItem('cases') || JSON.stringify(defaultCases));
            }
            renderCases();
            updateStats();
        }

        // 保存案例到 GitHub
        async function saveCasesToGitHub() {
            if (!githubToken) {
                showAlert('cases-alert', '请先配置 GitHub Token', 'error');
                return false;
            }

            try {
                // 先获取文件 SHA
                const getResponse = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.dataPath}?ref=${GITHUB_CONFIG.branch}`, {
                    headers: { 'Authorization': `token ${githubToken}` }
                });
                
                let sha = '';
                if (getResponse.ok) {
                    const data = await getResponse.json();
                    sha = data.sha;
                }

                // 更新文件
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(cases, null, 2))));
                const putResponse = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.dataPath}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: '更新案例数据',
                        content: content,
                        sha: sha,
                        branch: GITHUB_CONFIG.branch
                    })
                });

                if (putResponse.ok) {
                    // 同时保存到 localStorage 作为备份
                    localStorage.setItem('cases', JSON.stringify(cases));
                    showAlert('cases-alert', '保存成功！数据已同步到 GitHub', 'success');
                    return true;
                } else {
                    const error = await putResponse.json();
                    showAlert('cases-alert', '保存失败: ' + error.message, 'error');
                    return false;
                }
            } catch (error) {
                console.error('保存失败:', error);
                showAlert('cases-alert', '保存失败，请检查网络连接', 'error');
                return false;
            }
        }

        // 渲染案例列表
        function renderCases() {
            const tbody = document.getElementById('cases-table');
            tbody.innerHTML = cases.map(c => `
                <tr>
                    <td>${c.id}</td>
                    <td><img src="${c.image}" style="width: 60px; height: 40px; object-fit: cover; border-radius: 4px;" onerror="this.src='https://via.placeholder.com/60x40'"></td>
                    <td>${c.title}</td>
                    <td><span style="background: rgba(233,69,96,0.2); color: var(--accent); padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.8rem;">${c.category}</span></td>
                    <td>
                        <button class="btn-secondary" onclick="editCase(${c.id})" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; margin-right: 0.5rem;">编辑</button>
                        <button class="btn-danger" onclick="deleteCase(${c.id})" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        // 打开案例弹窗
        function openCaseModal(caseId = null) {
            document.getElementById('case-modal').classList.add('active');
            document.getElementById('modal-title').textContent = caseId ? '编辑案例' : '新增案例';
            
            if (caseId) {
                const c = cases.find(x => x.id === caseId);
                document.getElementById('case-id').value = c.id;
                document.getElementById('case-title').value = c.title;
                document.getElementById('case-category').value = c.category;
                document.getElementById('case-image').value = c.image;
                document.getElementById('case-description').value = c.description || '';
            } else {
                document.getElementById('case-form').reset();
                document.getElementById('case-id').value = '';
            }
        }

        // 关闭案例弹窗
        function closeCaseModal() {
            document.getElementById('case-modal').classList.remove('active');
        }

        // 保存案例
        document.getElementById('case-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const id = document.getElementById('case-id').value;
            const caseData = {
                id: id ? parseInt(id) : Date.now(),
                title: document.getElementById('case-title').value,
                category: document.getElementById('case-category').value,
                image: document.getElementById('case-image').value,
                description: document.getElementById('case-description').value
            };
            
            if (id) {
                const index = cases.findIndex(c => c.id === parseInt(id));
                cases[index] = caseData;
            } else {
                cases.push(caseData);
            }
            
            closeCaseModal();
            renderCases();
            updateStats();
            
            // 同步到 GitHub
            await saveCasesToGitHub();
        });

        // 编辑案例
        function editCase(id) {
            openCaseModal(id);
        }

        // 删除案例
        async function deleteCase(id) {
            if (!confirm('确定要删除这个案例吗？')) return;
            
            cases = cases.filter(c => c.id !== id);
            renderCases();
            updateStats();
            
            // 同步到 GitHub
            await saveCasesToGitHub();
        }

        // 加载咨询
        function loadInquiries() {
            inquiries = JSON.parse(localStorage.getItem('inquiries') || '[]');
            renderInquiries();
        }

        // 渲染咨询列表
        function renderInquiries() {
            const tbody = document.getElementById('inquiries-table');
            if (inquiries.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">暂无咨询记录</td></tr>';
                return;
            }
            
            tbody.innerHTML = inquiries.slice().reverse().map(i => `
                <tr>
                    <td>${new Date(i.date).toLocaleString()}</td>
                    <td>${i.name}</td>
                    <td>${i.phone}</td>
                    <td>${i.type || '-'}</td>
                    <td>${i.message || '-'}</td>
                </tr>
            `).join('');
        }

        // 更新统计
        function updateStats() {
            document.getElementById('stat-cases').textContent = cases.length;
            document.getElementById('stat-inquiries').textContent = inquiries.length;
            
            // 访问统计（从 localStorage）
            const visits = parseInt(localStorage.getItem('totalVisits') || '0');
            document.getElementById('stat-visits').textContent = visits;
            
            // 今日访问
            const today = new Date().toDateString();
            const todayVisits = parseInt(localStorage.getItem('visits_' + today) || '0');
            document.getElementById('stat-today').textContent = todayVisits;
        }

        // 修改密码
        document.getElementById('password-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const current = document.getElementById('current-password').value;
            const newPass = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            
            const storedPassword = localStorage.getItem('adminPassword') || 'admin123';
            
            if (current !== storedPassword) {
                alert('当前密码错误');
                return;
            }
            
            if (newPass !== confirm) {
                alert('两次输入的新密码不一致');
                return;
            }
            
            localStorage.setItem('adminPassword', newPass);
            alert('密码修改成功！');
            this.reset();
        });

        // 保存 GitHub Token
        function saveGitHubToken() {
            const token = document.getElementById('github-token').value.trim();
            if (token) {
                githubToken = token;
                localStorage.setItem('githubToken', token);
                alert('GitHub Token 已保存');
            } else {
                alert('请输入有效的 Token');
            }
        }

        // 显示提示
        function showAlert(containerId, message, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        // 检查登录状态
        if (localStorage.getItem('isLoggedIn') === 'true') {
            showDashboard();
        }

        // 加载已保存的 Token
        if (githubToken) {
            document.getElementById('github-token').value = githubToken;
        }
    </script>
</body>
</html>
